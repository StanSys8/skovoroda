server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Personal dashboard: keep compose output quiet. Errors are still logged.
  access_log off;

  location /api/ {
    proxy_pass http://backend:3900;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri /index.html;
  }
}
