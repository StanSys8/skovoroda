server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Personal dashboard: keep compose output quiet. Errors are still logged.
  access_log off;

  location /api/ {
    proxy_pass http://backend:3900;
    proxy_set_header Host $host;
  }

  # Content-hashed build assets never change under a given name → cache hard.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # index.html must always be revalidated, otherwise the browser keeps
  # loading a stale bundle reference after a rebuild and new features
  # (e.g. the About page) never appear.
  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache";
  }
}
