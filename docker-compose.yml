services:
  db:
    image: postgres:16-alpine
    container_name: skovoroda-db
    environment:
      POSTGRES_USER: ${DB_USER:-skovoroda}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skovoroda}
      POSTGRES_DB: ${DB_NAME:-skovoroda}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${BIND_HOST:-127.0.0.1}:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-skovoroda}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: skovoroda-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-skovoroda}
      DB_PASSWORD: ${DB_PASSWORD:-skovoroda}
      DB_NAME: ${DB_NAME:-skovoroda}
      PORT: 3900
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BIND_HOST:-127.0.0.1}:${API_PORT:-3900}:3900"

  frontend:
    build: ./frontend
    container_name: skovoroda-frontend
    depends_on:
      - backend
    ports:
      - "${BIND_HOST:-127.0.0.1}:${UI_PORT:-8080}:80"

volumes:
  db_data:
