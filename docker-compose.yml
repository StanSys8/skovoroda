services:
  db:
    image: postgres:16-alpine
    container_name: skovoroda-db
    environment:
      POSTGRES_USER: ${DB_USER:-skovoroda}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-skovoroda}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${BIND_HOST:-127.0.0.1}:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-skovoroda}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: skovoroda-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-skovoroda}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-skovoroda}
      PORT: 3900
      # Empty API_KEY = auth disabled (local dev). Set it in .env to require
      # a key on every /api request.
      API_KEY: ${API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BIND_HOST:-127.0.0.1}:${API_PORT:-3900}:3900"

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the bundle; must match the backend API_KEY.
        VITE_API_KEY: ${API_KEY:-}
    container_name: skovoroda-frontend
    depends_on:
      - backend
    ports:
      - "${BIND_HOST:-127.0.0.1}:${UI_PORT:-8080}:80"

volumes:
  db_data:
